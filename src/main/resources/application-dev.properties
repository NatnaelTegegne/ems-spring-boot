spring.datasource.url=jdbc:postgresql://localhost:5432/ems
spring.datasource.username=postgres
spring.datasource.password=0000
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.company.ems=DEBUG

app.jwt.secret=local-dev-secret-not-real
spring.error.include-message=always
spring.web.error.include-stacktrace=on_param

# Expose more endpoints for poking around locally
management.endpoints.web.exposure.include=health,info,metrics,env