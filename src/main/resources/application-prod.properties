spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}


spring.datasource.hikari.maximum-pool-size=5

spring.jpa.show-sql=false
logging.level.root=INFO

# Real frontend origin, also from env
app.cors.allowed-origins=${FRONTEND_URL}

# No default: if JWT_SECRET is missing, the app should refuse to start
app.jwt.secret=${JWT_SECRET}

#protect internals from clients
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never

#include health information on the web
management.endpoints.web.exposure.include=health